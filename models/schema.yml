version: 2                           # dbt schema version

sources:                              # external data sources
  - name: my_duckdb_source           # source name for {{ source() }}
    schema: main                     # duckdb schema
    tables:                          # source tables
      - name: raw_customers          
      - name: raw_orders             

models:                               # dbt models
  - name: stg_customers              # staging model
    columns:                         # column configs and tests
      - name: customer_id            
        tests:                       
          - unique                   
          - not_null                 

  - name: stg_orders                 
    columns:                         
      - name: order_id               
        tests:                       
          - unique                   
          - not_null                 
      - name: status                 
        tests:                       
          - accepted_values:         
              values: ['placed', 'shipped', 'completed', 'return_pending', 'returned']

  - name: customers_with_orders      # joined model
    columns:                         
      - name: customer_id            
        tests:                       
          - unique                   
          - not_null                 

  - name: customer_order_detail      # detailed model
    columns:                         
      - name: order_id               
        tests:                       
          - unique                   
          - not_null                 
      - name: customer_id            
        tests:                       
          - not_null                 
