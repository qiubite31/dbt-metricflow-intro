my_sqlite_profile: # profile name, matches dbt_project.yml
  target: dev      # default target environment
  outputs:
    dev:           # dev environment settings
      type: sqlite # database type
      threads: 1   # concurrent execution threads
      database: 'database' # internal dbt database identifier
      schema: 'main'      # default schema
      schemas_and_paths:  
        main: 'data.db'   # map main schema to data.db file
      schema_directory: '.' # directory for data.db